<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-1 Glowing Bulb</title>
    <style>
        .container-name{
            font-size: 50px;
            max-width: 100vw;
            margin-block:40px;
            text-align: center;
        }
        .container-bulb{
            height: 400px;
            width: 400px;
            margin: 100px auto;
            border-radius: 200px;
            border: 1px solid black;
        }
        .yellow{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="container-name">I m a glowing bulb</div>
        <div class="container-bulb yellow"></div>
    </div>
    <script>
        setInterval(() => {
        document.querySelector(".container-bulb").classList.toggle("yellow")            
        }, 1000);
    </script>
</body>
</html>
