<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="tasksLeft"></div>
    <button class="mode" style="background-color: #717070; border-radius: 4px; position: absolute; right: 250px; top: 0px; margin: 0px;">MODE</button>
    <div class="container">
        <h2>Tasks to be completed</h2>
        <div class="inputcontainer">
            <input class="text" type="text" placeholder="Add a task">
            <input type="date" class="deadline">
            <button class="btn">Save</button>
        </div>

        <button onclick="showlist('list1')">All</button>
        <button onclick="showlist('list2')">Completed</button>
        <button onclick="showlist('list3')">Pending</button>
        <ul id="list1" class="list "></ul>
        <ul id="list2" class=" list hidden"></ul>
        <ul id="list3" class=" list hidden"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
