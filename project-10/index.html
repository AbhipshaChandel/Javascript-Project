<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Water Gun Game</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #025748, #b1e5ce);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 420px;
        padding: 30px;
        border-radius: 20px;
        background: #034f3b;
        text-align: center;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-bottom: 5px;
        font-size: 30px;
        color: #fff;
      }

      h2 {
        margin-top: 0;
        font-weight: normal;
        color: #d8f3e6;
      }

      .buttons {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }

      .button {
        padding: 12px 18px;
        font-size: 16px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        background: #ffb703;
        color: #000;
        font-weight: bold;
        transition: 0.2s;
        box-shadow: 0 4px 0 #c78600;
      }

      .button:hover {
        transform: translateY(-3px);
        box-shadow: 0 7px 0 #c78600;
      }

      .button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #c78600;
      }

      #result {
        margin-top: 25px;
        font-size: 26px;
        font-weight: bold;
        color: #fff;
        min-height: 40px;
      }

      .scoreboard {
        margin-top: 15px;
        color: #e9fff6;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Snake 🐍 Water 💧 Gun 🔫</h1>
      <h2>Choose your move</h2>

      <div class="buttons">
        <button class="button btn2">Snake 🐍</button>
        <button class="button btn1">Water 💧</button>
        <button class="button btn3">Gun 🔫</button>
      </div>

      <div id="result">Make your move!</div>

      <div class="scoreboard">
        🧑 You: <span id="youScore">0</span> | 💻 Computer:
        <span id="compScore">0</span>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
