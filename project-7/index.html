<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project-7 Dynamic Website Builder</title>
    <style>
      .card {
        display: flex;
        border: 2px solid black;
        height: 150px;
        width: 80%;
        margin-inline: auto;
        margin-block: 20px;
        background-color: rgba(0, 0, 0, 0.442);
        gap: 30px;
      }
      .image{
        position: relative;
      }
      .capsule{
        position: absolute;
        bottom: 2px;
        right: 2px;
        color: white;
        border-radius: 12px;
        background-color: rgba(0, 0, 0, 0.829);
        padding: 4px 5px;
        z-index: 10;
      }

      .writeup {
        padding-block: 5px;
      }

      .write-up-1 h2 {
        padding: 0px;
        margin-block: 15px;
      }

      .write-up-2 p {
        padding: 0px;
        margin: 0px;
      }

      .write-up-2 {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image">
          <img
            src="https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEmCKgBEF5IWvKriqkDGQgBFQAAiEIYAdgBAeIBCggYEAIYBjgBQAE=&rs=AOn4CLB6VzxANxt3dHm91HW9lLfDlxvmuA"
            height="150px"
            alt=""
          />
          <div class="capsule">31:00</div>
        </div>

        <div class="writeup">
          <div class="write-up-1">
            <h2>Introduction to Backend | Sigma Web Dev #Video 2 </h2>
          </div>
          <div class="write-up-2">
            <p>CodewithHarry . 727k views . 2 Months  ago</p>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
