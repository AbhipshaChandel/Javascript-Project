<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project-14 Password Generator</title>
    <style>
        body{
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  font-family: Arial, sans-serif;
}

.container{
    height: 220px;
    width: 600px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
    background: #1c1f2b;
    padding: 20px;
    color: white;
}

.password{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}

h1{
    font-size: 20px;
    font-weight: 500;
}

button{
    height: 45px;
    width: 100px;
    background: #00ffb3;
    color: #111;
    font-weight: bold;
    border: none;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,255,179,0.4);
}

button:hover{
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,255,179,0.6);
}

button:active{
    transform: scale(0.95);
}

.write{
    margin-top: 20px;
    font-size: 28px;
    letter-spacing: 3px;
    background: #2a2f45;
    padding: 12px 20px;
    border-radius: 10px;
    color: #00ffb3;
    min-height: 40px;
}


    </style>
</head>
<body>
    <div class="container">
        <div class="password">
            <h1>Click here to generate a password</h1>
            <button class="button">Generate</button>
        </div>
        <div class="write">

        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
