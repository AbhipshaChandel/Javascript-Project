<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project-3 Faulty Calculator</title>
    <style>
    body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: Arial, sans-serif;
}

/* Main box */
.container {
  width: 400px;
  padding: 25px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  text-align: center;
}

/* Headings */
h1 {
  font-size: 18px;
  margin-bottom: 10px;
}

/* Inputs */
.input, .cond {
  width: 80%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  outline: none;
  transition: 0.3s;
}

.input:focus, .cond:focus {
  border-color: #667eea;
  box-shadow: 0 0 5px #667eea;
}

/* Button */
.button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  background: #5a67d8;
  transform: scale(1.05);
}

/* Result box */
.res {
  margin-top: 20px;
  padding: 15px;
  background: #f3f4f6;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  color: #333;
}
    </style>
  </head>
  <body>
    <div class="container">

      <div class="box1">
        <h1>Enter first number</h1>
        <input class="input input1" type="number" placeholder="FirstNumber" />
      </div>


      <div class="box2">
        <h1>Enter second number</h1>
        <input class="input input2" type="number" placeholder="SecondNumber" />
      </div>


      <div class="condition">
        <h1>Which operation u want to perform</h1>
        <input type="number" class="cond" placeholder="1:+ 2:- 3:* 4:/" />
      </div>
      <button class="button">RESULT</button>

      <div class="res">
        <div class="result"></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
