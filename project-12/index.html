<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project-12 Digital Clock</title>
    <style>

        body{
            height:90vh;
            justify-items: center;
            align-content: center;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            font-family: Arial, sans-serif;
        }
        .container{
            height: 300px;
            width: 500px;
            justify-items: center;
            font-size: 60px;
            color: #00ffcc;
            color: black;
            background: #111;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00ffcc;
            letter-spacing: 3px;
        
        }
        .date{
            text-align: center;
            font-size: 21px;
            padding-inline: 4px;
            align-content: center;
            margin: 20px;
            height: 100px;
            width: 250px;
            background-color: rgb(184, 182, 178);
            border-radius: 12px;
            box-shadow: 0 0 20px  rgb(124, 123, 121);
        }

        .time{
            text-align: center;
            font-size: 22px;
            padding-inline: 4px;
            margin: 20px;
            align-content: center;
            height: 100px;
            width: 250px;
            background-color: rgb(203, 200, 192);
            border-radius: 12px;
            box-shadow: 0 0 20px  rgb(124, 123, 121);
        }
 
    </style>
</head>
<body>
    <div class="container">
        <div class="date"> </div>
        <div class="time"></div>
        <script src="index.js"></script>
    </div>
</body>
</html>
